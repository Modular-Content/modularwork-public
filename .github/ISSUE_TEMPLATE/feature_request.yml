name: Feature Request
description: Suggest an improvement or a new feature.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Feature requests should describe the problem first, not only the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your idea.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: textarea
    id: benefits
    attributes:
      label: Expected Benefits

  - type: textarea
    id: additional
    attributes:
      label: Additional Context